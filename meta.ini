nexusDescription="Adds LOD for a number of prominent objects across the Capital Wasteland.\n<br />\n<br />[b]As with almost all LOD mods, this is not standalone and requires FNVLODGen to work.[/b]\n<br />\n<br />[url=https://ko-fi.com/N4N717DRMI/][img width=204,height=40 alt='Support Me at ko-fi.com']https://imgur.com/7Cm07AZ.png[/img][/url]\n<br />\n<br />-------------------------------------------------- Description --------------------------------------------------\n<br />[b]Load Order:[/b]\n<br />This mod should be loaded after [i]More LODs Additions and Fixes[/i], to replace their dock LOD meshes.\n<br />\n<br />The load order for other mod conflicts like [i]Nuclear LOD[/i] and [i]LOD additions and improvements[/i] doesn't matter.\n<br />The overwritten files are identical texture files, so nothing is being lost or gained.        \n<br />\n<br />[b]LOD meshes for:[/b]\n<br />[list]\n<br />[*]All boats\n<br />[*]Monorail car and engine\n<br />[*]Subway car\n<br />[*]Citadel bridge\n<br />[*]Jefferson memorial bridge\n<br />[*]Industrial machines\n<br />[*]Docks\n<br />[*]Point Lookout steamboat\n<br />[*]Industrial chimney\n<br />[*]Road overpass: mid solid, support and ramp\n<br />[*]Megaton Nathans house\n<br />[*]Brick path\n<br />[*]Lamp post\n<br />[*]Discount Darren sign\n<br />[*]Springvale School sign\n<br />[*]Red Racer factory sign\n<br />[/list]\n<br />-------------------------------------------------- Credits --------------------------------------------------\n<br />GIMP, Nifscope, and Blender were used in creating these models."
